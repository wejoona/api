# Korido API CI/CD
# Build → push to registry → update gitops → ArgoCD syncs
stages:
  - build
  - deploy

variables:
  REGISTRY: localhost:30500
  IMAGE_NAME: usdc-wallet-api
  FULL_IMAGE: "${REGISTRY}/${IMAGE_NAME}"
  GITOPS_REPO: "https://BenOuttara:${CI_JOB_TOKEN}@gitlab.wejoona.com/korido/gitops.git"

build:
  stage: build
  tags:
    - vps-prod
  script:
    - DOCKER_BUILDKIT=1 docker build -t "${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}" -t "${FULL_IMAGE}:latest" .
    - docker push "${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker push "${FULL_IMAGE}:latest"
    - docker rmi "${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}" "${FULL_IMAGE}:latest" || true
  only:
    - main

deploy:
  stage: deploy
  tags:
    - vps-prod
  script:
    - git clone "https://BenOuttara:${GITOPS_TOKEN}@gitlab.wejoona.com/korido/gitops.git" /tmp/gitops-korido
    - cd /tmp/gitops-korido
    - "sed -i 's/tag: .*/tag: \"${CI_COMMIT_SHORT_SHA}\"/' envs/prod/api/values.yaml"
    - git config user.email "ci@wejoona.com"
    - git config user.name "GitLab CI"
    - git add -A
    - "git commit -m 'deploy: korido-api ${CI_COMMIT_SHORT_SHA} [skip ci]' || true"
    - git push origin main || true
    - rm -rf /tmp/gitops-korido
  only:
    - main
