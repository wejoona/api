stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: registry.wejoona.com/usdc-wallet-api

# Test stage
test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps
  script:
    - npm run lint
    - npm run test
  only:
    - merge_requests
    - main
    - develop

# Build Docker image using Kaniko (no privileged mode required)
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - AUTH=$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    - printf '{"auths":{"%s":{"auth":"%s"},"registry.wejoona.com":{"auth":"%s"}}}' "$CI_REGISTRY" "$AUTH" "$AUTH" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHA}"
      --destination "${DOCKER_IMAGE}:latest"
      --cache=true
  only:
    - main
    - tags

# Deploy to K8s
deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl set image deployment/wallet-api wallet-api=$DOCKER_IMAGE:$CI_COMMIT_SHA -n usdc-wallet
    - kubectl rollout restart deployment/wallet-api -n usdc-wallet
    - kubectl rollout status deployment/wallet-api -n usdc-wallet --timeout=300s
  environment:
    name: production
    url: https://wallet-api.wejoona.com
  only:
    - main
