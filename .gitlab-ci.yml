stages:
  - test
  - build

variables:
  DOCKER_IMAGE: registry.wejoona.com/usdc-wallet-api

# Lint and unit tests
test:unit:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps
  script:
    - npm run lint
    - npm run test
  only:
    - merge_requests
    - main
    - develop

# Contract tests - validate API responses match mobile expectations
# CRITICAL: These tests catch breaking changes before deploy
test:contracts:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps
  script:
    - npm run test:contracts
  only:
    - merge_requests
    - main
    - develop

# E2E Integration tests - validate complete user flows
# Uses testcontainers for isolated PostgreSQL and Redis
test:e2e:
  stage: test
  image: node:20-alpine
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    TESTCONTAINERS_RYUK_DISABLED: "true"
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - apk add --no-cache docker-cli
    - npm ci --legacy-peer-deps
  script:
    - npm run test:e2e
  only:
    - merge_requests
    - main
  allow_failure: true  # E2E tests may be flaky, don't block deploys initially

# Build Docker image using Kaniko (no privileged mode required)
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - AUTH=$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    - printf '{"auths":{"%s":{"auth":"%s"},"registry.wejoona.com":{"auth":"%s"}}}' "$CI_REGISTRY" "$AUTH" "$AUTH" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHA}"
      --destination "${DOCKER_IMAGE}:latest"
      --cache=true
      --cache-repo "${DOCKER_IMAGE}/cache"
      --cache-ttl 168h
      --snapshot-mode=redo
      --use-new-run
  only:
    - main
    - tags

# Deploy handled by ArgoCD Image Updater (watches registry.wejoona.com)
