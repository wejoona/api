# CI/CD Pipeline for USDC Wallet API
# Build on VPS runner → import to k3s → ArgoCD auto-syncs
# No registry needed. Image lives in k3s containerd.

stages:
  - build
  - deploy

variables:
  IMAGE_NAME: usdc-wallet-api

# Build Docker image and import directly to k3s
build:
  stage: build
  tags:
    - vps-prod
  script:
    - docker build --platform linux/amd64 -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" -t "$IMAGE_NAME:latest" .
    - docker save "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" | k3s ctr images import -
    - docker save "$IMAGE_NAME:latest" | k3s ctr images import -
    # Cleanup local docker image to save disk
    - docker rmi "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" "$IMAGE_NAME:latest" || true
  only:
    - main

# Rolling deploy via kubectl (ArgoCD will also auto-sync)
deploy:
  stage: deploy
  tags:
    - vps-prod
  script:
    - kubectl -n usdc-wallet set image deployment/usdc-wallet-api api="$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - kubectl -n usdc-wallet rollout status deployment/usdc-wallet-api --timeout=120s
  only:
    - main
