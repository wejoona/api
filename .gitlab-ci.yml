stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: registry.wejoona.com/usdc-wallet-api

# Test stage
test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps
  script:
    - npm run lint
    - npm run test
  only:
    - merge_requests
    - main
    - develop

# Build Docker image
build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - tags

# Deploy to K8s
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/wallet-api wallet-api=$DOCKER_IMAGE:$CI_COMMIT_SHA -n usdc-wallet
    - kubectl rollout restart deployment/wallet-api -n usdc-wallet
    - kubectl rollout status deployment/wallet-api -n usdc-wallet --timeout=300s
  environment:
    name: production
    url: https://wallet-api.wejoona.com
  only:
    - main
  when: manual
