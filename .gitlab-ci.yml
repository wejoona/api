stages:
  - test
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^deploy:/
      when: never
    - when: always

variables:
  DOCKER_IMAGE: registry.wejoona.com/usdc-wallet-api

# Test stage
test:
  stage: test
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps
  script:
    - npm run lint
    - npm run test
  only:
    - merge_requests
    - main
    - develop

# Build Docker image using Kaniko (no privileged mode required)
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - AUTH=$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')
    - printf '{"auths":{"%s":{"auth":"%s"},"registry.wejoona.com":{"auth":"%s"}}}' "$CI_REGISTRY" "$AUTH" "$AUTH" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHA}"
      --destination "${DOCKER_IMAGE}:latest"
      --cache=true
  only:
    - main
    - tags

# Deploy via GitOps (ArgoCD watches k8s/ manifests)
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git sed
    - git config user.email "ci@wejoona.com"
    - git config user.name "GitLab CI"
  script:
    - sed -i "s|image: registry.wejoona.com/usdc-wallet-api:.*|image: registry.wejoona.com/usdc-wallet-api:${CI_COMMIT_SHA}|" k8s/deployment.yaml
    - git add k8s/deployment.yaml
    - git commit -m "deploy: update image to ${CI_COMMIT_SHA}" || echo "No changes to commit"
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.wejoona.com/usdc-wallet/api.git HEAD:main
  environment:
    name: production
    url: https://wallet-api.wejoona.com
  only:
    - main
