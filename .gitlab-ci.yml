# CI/CD: build -> push to Harbor -> bump gitops tag -> ArgoCD syncs.
# Harbor creds (HARBOR_USER/HARBOR_PASS/HARBOR_REGISTRY) are group CI/CD vars.
# GITOPS_TOKEN is a group/project CI/CD var with write access to the gitops repo.
# Deploy is GitOps-only: no imperative kubectl here (ArgoCD owns the cluster).
stages:
  - build
  - deploy

variables:
  IMAGE: "${HARBOR_REGISTRY}/korido/usdc-wallet-api"

build:
  stage: build
  tags:
    - vps-prod
  script:
    - echo "${HARBOR_PASS}" | docker login "${HARBOR_REGISTRY}" -u "${HARBOR_USER}" --password-stdin
    - DOCKER_BUILDKIT=1 docker build --platform linux/amd64 -t "${IMAGE}:${CI_COMMIT_SHORT_SHA}" .
    - docker push "${IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - docker rmi "${IMAGE}:${CI_COMMIT_SHORT_SHA}" || true
  only:
    - main

deploy:
  stage: deploy
  tags:
    - vps-prod
  script:
    - git clone "https://oauth2:${GITOPS_TOKEN}@gitlab.wejoona.com/korido/gitops.git" /tmp/gitops-${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}
    - cd /tmp/gitops-${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}
    - 'sed -i "s/tag: .*/tag: \"${CI_COMMIT_SHORT_SHA}\"/" envs/prod/api/values.yaml'
    - git config user.email "ci@wejoona.com"
    - git config user.name "GitLab CI"
    - git add -A
    - git commit -m "deploy: usdc-wallet-api ${CI_COMMIT_SHORT_SHA} [skip ci]" || true
    - git push origin HEAD:main || true
    - rm -rf /tmp/gitops-${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}
  only:
    - main