# ============================================================
# JoonaPay Database Maintenance Cron Jobs
# ============================================================
#
# Installation:
#   1. Copy this file: sudo cp crontab.conf /etc/cron.d/joonapay-db-maintenance
#   2. Set permissions: sudo chmod 644 /etc/cron.d/joonapay-db-maintenance
#   3. Verify: sudo systemctl restart cron
#
# Or add to user crontab:
#   crontab -e
#   # Then paste the job definitions below
#
# Environment Variables Required:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
#   Set these in /etc/environment or in the cron job definitions
#
# Log Directory:
#   Ensure /var/log/joonapay/db-maintenance exists and is writable
#   sudo mkdir -p /var/log/joonapay/db-maintenance
#   sudo chown joonapay:joonapay /var/log/joonapay/db-maintenance
#
# ============================================================

# Shell and PATH
SHELL=/bin/bash
PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin

# Database connection environment variables
# Override these in /etc/environment for production
DB_HOST=localhost
DB_PORT=5432
DB_NAME=joonapay
DB_USER=joonapay
# DB_PASSWORD should be set via environment file, not here

# Log directory
LOG_DIR=/var/log/joonapay/db-maintenance

# Script directory
SCRIPT_DIR=/opt/joonapay/usdc-wallet/scripts/db-maintenance

# ============================================================
# VACUUM ANALYZE - Daily at 03:00 UTC (during low-traffic period)
# ============================================================
# Reclaims storage and updates query planner statistics
# Duration: 5-30 minutes depending on table sizes
#
0 3 * * * joonapay $SCRIPT_DIR/vacuum-analyze.sh >> $LOG_DIR/vacuum-cron.log 2>&1

# ============================================================
# REINDEX - Weekly on Sunday at 04:00 UTC
# ============================================================
# Rebuilds indexes to eliminate bloat
# Duration: 15-60 minutes depending on index sizes
# Note: REINDEX CONCURRENTLY minimizes locking (PostgreSQL 12+)
#
0 4 * * 0 joonapay $SCRIPT_DIR/reindex.sh >> $LOG_DIR/reindex-cron.log 2>&1

# ============================================================
# BLOAT CHECK REPORT - Daily at 06:00 UTC
# ============================================================
# Generates bloat analysis report for monitoring
# Duration: 1-5 minutes
#
0 6 * * * joonapay PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -f $SCRIPT_DIR/bloat-check.sql > $LOG_DIR/bloat-report-$(date +\%Y\%m\%d).log 2>&1

# ============================================================
# SLOW QUERY REPORT - Daily at 07:00 UTC
# ============================================================
# Generates slow query analysis for optimization
# Duration: 1-3 minutes
#
0 7 * * * joonapay PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -f $SCRIPT_DIR/slow-query-report.sql > $LOG_DIR/slow-query-report-$(date +\%Y\%m\%d).log 2>&1

# ============================================================
# TABLE SIZE REPORT - Weekly on Monday at 08:00 UTC
# ============================================================
# Generates storage usage report for capacity planning
# Duration: 1-3 minutes
#
0 8 * * 1 joonapay PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -f $SCRIPT_DIR/table-size-report.sql > $LOG_DIR/table-size-report-$(date +\%Y\%m\%d).log 2>&1

# ============================================================
# LOG ROTATION - Daily at 02:00 UTC
# ============================================================
# Clean up old maintenance logs (keep 30 days)
#
0 2 * * * joonapay find $LOG_DIR -name "*.log" -type f -mtime +30 -delete 2>/dev/null

# ============================================================
# STATISTICS COLLECTION - Every 6 hours
# ============================================================
# Update statistics for query optimizer (lighter than full ANALYZE)
# Useful for tables with frequent changes
#
0 */6 * * * joonapay PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -c "ANALYZE transactions; ANALYZE wallets; ANALYZE sessions;" >> $LOG_DIR/quick-analyze.log 2>&1

# ============================================================
# ALERT: Check for Critical Bloat - Every 4 hours
# ============================================================
# Quick check for tables exceeding 20% dead tuple ratio
# Sends alert if critical bloat detected
#
0 */4 * * * joonapay PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -t -A -c "SELECT schemaname || '.' || relname FROM pg_stat_user_tables WHERE (n_dead_tup::float / NULLIF(n_live_tup + n_dead_tup, 0) * 100) > 20" | grep -q . && echo "CRITICAL: Tables with >20% bloat detected at $(date)" >> $LOG_DIR/alerts.log

# ============================================================
# Production Schedule Summary:
# ============================================================
#
# 02:00 UTC - Log rotation (cleanup old logs)
# 03:00 UTC - VACUUM ANALYZE (daily)
# 04:00 UTC - REINDEX (Sunday only)
# 06:00 UTC - Bloat check report (daily)
# 07:00 UTC - Slow query report (daily)
# 08:00 UTC - Table size report (Monday only)
# Every 6h  - Quick statistics update
# Every 4h  - Critical bloat alert check
#
# ============================================================
