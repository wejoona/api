name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        test-suite:
          - user-journey
          - api-contracts
          - security
          - performance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Docker for Testcontainers
        run: |
          docker --version
          docker ps

      - name: Run E2E tests - ${{ matrix.test-suite }}
        run: npm run test:e2e:${{ matrix.test-suite }}
        env:
          NODE_ENV: test
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results-${{ matrix.test-suite }}
          path: |
            coverage-e2e/
            test-results/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.test-suite == 'user-journey'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage-e2e/lcov.info
          flags: e2e
          name: e2e-coverage
          fail_ci_if_error: false

  e2e-full-suite:
    name: Full E2E Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: e2e-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full E2E test suite
        run: npm run test:e2e:cov
        env:
          NODE_ENV: test
          CI: true

      - name: Generate test report
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All E2E tests completed successfully!" >> $GITHUB_STEP_SUMMARY

      - name: Upload full coverage
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-full-coverage
          path: coverage-e2e/
          retention-days: 30

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [e2e-tests, e2e-full-suite]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.e2e-tests.result }}" == "success" ] && [ "${{ needs.e2e-full-suite.result }}" == "success" ]; then
            echo "✅ All E2E tests passed!"
          else
            echo "❌ Some E2E tests failed!"
            exit 1
          fi
