# =============================================================================
# ArgoCD Application for USDC Wallet API
# =============================================================================
# Configured with Image Updater to auto-deploy new images
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: usdc-wallet-api
  namespace: argocd
  annotations:
    # Image Updater configuration
    argocd-image-updater.argoproj.io/image-list: api=registry.wejoona.com/usdc-wallet-api
    argocd-image-updater.argoproj.io/api.update-strategy: latest
    argocd-image-updater.argoproj.io/api.pull-secret: pullsecret:argocd/wejoona-registry-credentials
    argocd-image-updater.argoproj.io/write-back-method: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.wejoona.com/usdc-wallet/api.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: usdc-wallet
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
