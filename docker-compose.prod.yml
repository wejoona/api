# =============================================================================
# JoonaPay USDC Wallet - Docker Compose (Production)
# =============================================================================
# Production-ready configuration with:
# - External managed services (RDS, ElastiCache)
# - Security hardening
# - Resource limits
# - Replica scaling
# - Secrets management
#
# Usage:
#   Deploy:           docker compose -f docker-compose.prod.yml up -d
#   Scale API:        docker compose -f docker-compose.prod.yml up -d --scale api=3
#   View logs:        docker compose -f docker-compose.prod.yml logs -f api
#   Rolling update:   docker compose -f docker-compose.prod.yml up -d --no-deps api
#
# Prerequisites:
#   - Create .env.production with production values
#   - Set up external PostgreSQL (RDS) and Redis (ElastiCache)
#   - Configure secrets in Docker Swarm or external secrets manager
#
# For Kubernetes deployment, see /k8s directory
# =============================================================================

services:
  # ===========================================================================
  # API Service (NestJS Application) - Production
  # ===========================================================================
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/joonapay}/usdc-wallet-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: 20
      cache_from:
        - ${DOCKER_REGISTRY:-ghcr.io/joonapay}/usdc-wallet-api:latest
    deploy:
      mode: replicated
      replicas: ${API_REPLICAS:-2}
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-1.0}"
          memory: ${API_MEMORY_LIMIT:-512M}
        reservations:
          cpus: "${API_CPU_RESERVATION:-0.25}"
          memory: ${API_MEMORY_RESERVATION:-256M}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:-api.joonapay.com}`)"
        - "traefik.http.routers.api.tls=true"
        - "traefik.http.routers.api.tls.certresolver=letsencrypt"
        - "traefik.http.services.api.loadbalancer.server.port=3000"
        - "traefik.http.services.api.loadbalancer.healthcheck.path=/api/v1/health"
        - "traefik.http.services.api.loadbalancer.healthcheck.interval=30s"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      # Database (External - RDS)
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SYNCHRONIZE: "false"
      DATABASE_LOGGING: "false"
      DATABASE_SSL: ${DATABASE_SSL:-true}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      # Redis (External - ElastiCache)
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TLS: ${REDIS_TLS:-true}
      # JWT (Use secrets in production)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Circle (Production)
      CIRCLE_API_URL: ${CIRCLE_API_URL:-https://api.circle.com}
      CIRCLE_API_KEY: ${CIRCLE_API_KEY}
      CIRCLE_ENTITY_SECRET: ${CIRCLE_ENTITY_SECRET}
      CIRCLE_WALLET_SET_ID: ${CIRCLE_WALLET_SET_ID}
      CIRCLE_DEFAULT_BLOCKCHAIN: ${CIRCLE_DEFAULT_BLOCKCHAIN:-MATIC}
      CIRCLE_WEBHOOK_SECRET: ${CIRCLE_WEBHOOK_SECRET}
      CIRCLE_USE_MOCK: "false"
      # Yellow Card (Production)
      YELLOW_CARD_API_URL: ${YELLOW_CARD_API_URL:-https://api.yellowcard.io}
      YELLOW_CARD_API_KEY: ${YELLOW_CARD_API_KEY}
      YELLOW_CARD_SECRET_KEY: ${YELLOW_CARD_SECRET_KEY}
      YELLOW_CARD_WEBHOOK_SECRET: ${YELLOW_CARD_WEBHOOK_SECRET}
      YELLOW_CARD_USE_MOCK: "false"
      # Firebase
      FCM_PROJECT_ID: ${FCM_PROJECT_ID}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY}
      FCM_USE_MOCK: "false"
      # SMS (Production)
      SMS_PROVIDER: ${SMS_PROVIDER:-africastalking}
      SMS_API_KEY: ${SMS_API_KEY}
      SMS_API_SECRET: ${SMS_API_SECRET}
      SMS_SENDER_ID: ${SMS_SENDER_ID:-JoonaPay}
      # OTP
      OTP_EXPIRES_IN: ${OTP_EXPIRES_IN:-300}
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
      # Rate Limiting (stricter in production)
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
      # App Settings
      DEFAULT_COUNTRY: ${DEFAULT_COUNTRY:-CI}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USDC}
      SUPPORTED_COUNTRIES: ${SUPPORTED_COUNTRIES:-CI,SN,ML,BF,BJ,TG,NE}
      SUPPORTED_CURRENCIES: ${SUPPORTED_CURRENCIES:-USDC,XOF,USD}
      MIN_DEPOSIT_AMOUNT: ${MIN_DEPOSIT_AMOUNT:-500}
      MAX_DEPOSIT_AMOUNT: ${MAX_DEPOSIT_AMOUNT:-1000000}
      MIN_TRANSFER_AMOUNT: ${MIN_TRANSFER_AMOUNT:-1}
      MAX_TRANSFER_AMOUNT: ${MAX_TRANSFER_AMOUNT:-10000}
      INTERNAL_TRANSFER_FEE_PERCENT: ${INTERNAL_TRANSFER_FEE_PERCENT:-0}
      EXTERNAL_TRANSFER_FEE_PERCENT: ${EXTERNAL_TRANSFER_FEE_PERCENT:-0.5}
      # Observability
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: usdc-wallet-api
      PROMETHEUS_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - usdc_wallet_prod_network
    # No volume mounts in production
    read_only: true
    tmpfs:
      - /tmp:size=100M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        labels: "service,environment"
    labels:
      service: "usdc-wallet-api"
      environment: "production"

  # ===========================================================================
  # Nginx Reverse Proxy (Optional - if not using Traefik/ALB)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    profiles:
      - with-nginx
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - usdc_wallet_prod_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ===========================================================================
  # Migration Runner (Run once before deployment)
  # ===========================================================================
  migration:
    image: ${DOCKER_REGISTRY:-ghcr.io/joonapay}/usdc-wallet-api:${IMAGE_TAG:-latest}
    profiles:
      - migration
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: none
    environment:
      NODE_ENV: production
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: ${DATABASE_SSL:-true}
    command: ["node", "dist/database/run-migrations.js"]
    networks:
      - usdc_wallet_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Networks
# =============================================================================
networks:
  usdc_wallet_prod_network:
    driver: overlay
    name: usdc_wallet_prod_network
    attachable: true
    driver_opts:
      encrypted: "true"

