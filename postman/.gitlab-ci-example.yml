# Full test suite with HTML report
full-test-suite:
  stage: test
  image: node:18-alpine
  needs: [health-check]
  before_script:
    - npm install -g newman newman-reporter-htmlextra
  script:
    - |
      newman run usdc-wallet/postman/JoonaPay_API.postman_collection.json \
        -e usdc-wallet/postman/JoonaPay_Staging.postman_environment.json \
        --reporters cli,htmlextra,junit \
        --reporter-htmlextra-export test-results/report.html \
        --reporter-htmlextra-darkTheme \
        --reporter-htmlextra-title "JoonaPay API Test Report - Build $CI_PIPELINE_ID" \
        --reporter-junit-export test-results/results.xml \
        --delay-request 500
  artifacts:
    reports:
      junit: test-results/results.xml
    paths:
      - test-results/
    expire_in: 1 month
  only:
    - main
    - develop

# Deploy HTML report to GitLab Pages
pages:
  stage: report
  image: alpine:latest
  needs: [full-test-suite]
  script:
    - mkdir -p public
    - cp test-results/report.html public/index.html
  artifacts:
    paths:
      - public
  only:
    - main

# Scheduled nightly tests
nightly-tests:
  stage: test
  image: node:18-alpine
  before_script:
    - npm install -g newman newman-reporter-htmlextra
  script:
    - |
      newman run usdc-wallet/postman/JoonaPay_API.postman_collection.json \
        -e usdc-wallet/postman/JoonaPay_Production.postman_environment.json \
        --reporters cli,htmlextra \
        --reporter-htmlextra-export test-results/nightly-report.html \
        --delay-request 1000
  artifacts:
    paths:
      - test-results/
    expire_in: 1 week
  only:
    - schedules
  allow_failure: true
