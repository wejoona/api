# GitLab CI - API Tests
# Example pipeline for running Postman tests in GitLab CI/CD
#
# To use:
# 1. Copy content to .gitlab-ci.yml (merge with existing)
# 2. Commit to repository
# 3. Tests run on every push and merge request

stages:
  - health
  - test
  - report

variables:
  NEWMAN_VERSION: "latest"

# Health check (fast fail)
health-check:
  stage: health
  image: postman/newman:alpine
  script:
    - |
      newman run usdc-wallet/postman/JoonaPay_API.postman_collection.json \
        -e usdc-wallet/postman/JoonaPay_Staging.postman_environment.json \
        --folder "Health" \
        --reporters cli \
        --bail
  only:
    - branches
    - merge_requests

# Authentication tests
test-auth:
  stage: test
  image: postman/newman:alpine
  needs: [health-check]
  script:
    - |
      newman run usdc-wallet/postman/JoonaPay_API.postman_collection.json \
        -e usdc-wallet/postman/JoonaPay_Staging.postman_environment.json \
        --folder "Authentication" \
        --reporters cli,junit \
        --reporter-junit-export test-results/auth.xml \
        --delay-request 500
  artifacts:
    reports:
      junit: test-results/auth.xml
    paths:
      - test-results/
    expire_in: 1 week
  only:
    - branches
    - merge_requests

